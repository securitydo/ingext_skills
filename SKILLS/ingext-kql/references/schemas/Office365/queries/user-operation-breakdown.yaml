description: >-
  For a specific user over the past 90 days, the count of Office365 audit events
  broken down by operation (MailItemsAccessed, UserLoggedIn, Send, HardDelete,
  Set-InboxRule, etc.). Surfaces high-signal operations for triage. Replace the
  UserId value with the account being investigated.
datatype: Office365
kql: |
  Office365
  | where timestamp > ago(90d)
  | where tolower(UserId) == "username@acme.com"
  | summarize events = count() by Operation
  | top 40 by events desc
tags: [office365, user-investigation, operations, triage]
