description: >-
  For a specific user over the past 90 days, every inbox-rule creation or
  modification (New-InboxRule, Set-InboxRule, UpdateInboxRules) with the rule
  Parameters, source IP and result. Hidden/forwarding rules are a primary
  Business Email Compromise (BEC) indicator. Replace the UserId value with the
  account being investigated.
datatype: Office365
kql: |
  Office365
  | where timestamp > ago(90d)
  | where tolower(UserId) == "username@acme.com"
  | where Operation in ("New-InboxRule", "Set-InboxRule", "UpdateInboxRules")
  | project timestamp, Operation, ClientIP, ResultStatus, Parameters, ModifiedProperties, ExtendedProperties
  | order by timestamp asc
tags: [office365, user-investigation, inbox-rules, bec, exchange]
