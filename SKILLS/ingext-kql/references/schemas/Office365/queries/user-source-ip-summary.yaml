description: >-
  For a specific user over the past 90 days, a per-source-IP summary of their
  Office365 activity. Counts total events, successful logins, failed logins and
  sent mail, with the first and last time each IP was seen. Drives source-IP /
  GeoIP analysis and impossible-travel detection. Replace the UserId value with
  the account being investigated.
datatype: Office365
kql: |
  Office365
  | where timestamp > ago(90d)
  | where tolower(UserId) == "username@acme.com"
  | where isnotempty(ClientIP)
  | summarize events = count(),
              logins = countif(Operation == "UserLoggedIn"),
              failed = countif(Operation == "UserLoginFailed"),
              sends  = countif(Operation == "Send"),
              firstSeen = min(timestamp),
              lastSeen  = max(timestamp)
          by ClientIP
  | top 200 by events desc
tags: [office365, user-investigation, source-ip, geoip, impossible-travel]
