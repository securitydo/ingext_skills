description: >-
  For a specific user over the past 30 days, the files they accessed most often
  in Office365. Returns the access count and last access time per file and site.
  Replace the UserId value with the account being investigated.
datatype: Office365
kql: |
  Office365
  | where timestamp > ago(30d)
  | where UserId == "username@acme.com"
  | where Operation == "FileAccessed"
  | summarize accesses = count(), last_access = max(timestamp) by SourceFileName, SiteUrl
  | top 100 by accesses desc
tags: [office365, file-access, user-investigation]
