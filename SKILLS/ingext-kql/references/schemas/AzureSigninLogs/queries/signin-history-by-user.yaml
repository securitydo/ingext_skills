description: |-
  Returns the sign-in activity history for the specified user within the selected
  time range. This report provides a detailed timeline of the user's
  authentication events in Azure Active Directory, helping investigators assess
  whether the account shows signs of compromise, unusual access patterns, or
  suspicious behavior following a security alert.

  Key insights provided:
  - Successful and failed sign-in attempts
  - Source IP addresses and geographic locations
  - Applications and resources accessed
  - Device and client information (OS, browser, managed/compliant status)
  - Authentication context (interactive vs non-interactive, client app)
  - Conditional Access results and enforcement outcomes
  - Risk indicators (if available)
datatype: AzureSigninLogs
kql: |
  let UserEmail = tolower("adele.vance@contoso.com");
  let StartTime = ago(7d);
  let EndTime = now();
  AzureSigninLogs
  | where TimeGenerated between (StartTime .. EndTime)
  | where tolower(UserPrincipalName) == UserEmail
  | extend
      ResultCode = tostring(ResultType),
      ResultStatus = iff(ResultType == "0", "Success", "Failure"),
      ErrorCode = tostring(Status.errorCode),
      FailureReason = tostring(Status.failureReason),
      StatusDetail = tostring(Status.additionalDetails),
      Country = tostring(Location),
      City = tostring(LocationDetails.city),
      State = tostring(LocationDetails.state),
      Latitude = todouble(LocationDetails.geoCoordinates.latitude),
      Longitude = todouble(LocationDetails.geoCoordinates.longitude),
      DeviceName = tostring(DeviceDetail.displayName),
      DeviceId = tostring(DeviceDetail.deviceId),
      OS = tostring(DeviceDetail.operatingSystem),
      Browser = tostring(DeviceDetail.browser),
      IsCompliant = tostring(DeviceDetail.isCompliant),
      IsManaged = tostring(DeviceDetail.isManaged),
      TrustType = tostring(DeviceDetail.trustType)
  | project
      TimeGenerated,
      UserPrincipalName,
      UserDisplayName,
      UserId,
      AppDisplayName,
      AppId,
      ResourceDisplayName,
      ResourceId,
      IPAddress,
      Country,
      State,
      City,
      IsInteractive,
      ClientAppUsed,
      UserAgent,
      DeviceName,
      DeviceId,
      OS,
      Browser,
      IsManaged,
      IsCompliant,
      TrustType,
      ConditionalAccessStatus,
      ResultStatus,
      ResultCode,
      ErrorCode,
      FailureReason,
      StatusDetail,
      RiskLevelDuringSignIn,
      RiskLevelAggregated,
      RiskState,
      CorrelationId,
      Id,
      DeviceDetail,
      MfaDetail,
      AuthenticationDetails,
      AuthenticationAppDeviceDetails,
      AuthenticationProcessingDetails,
      NetworkLocationDetails
  | order by TimeGenerated desc
tags: [azure-ad, signin-logs, authentication, user-activity, investigation]
expected_output: |
