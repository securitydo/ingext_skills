description: >-
  Open Cortex XDR incidents triage: lists incidents that are still 'new' (not yet
  investigated or resolved), with their effective severity and risk score, the
  contributing alert categories and per-severity alert counts, and the affected
  hosts and users. Ordered to surface the highest-scoring, most recent incidents
  first so analysts can prioritize response.
datatype: CortexIncident
kql: |
  CortexIncident
  | where status == "new"
  | extend Hosts = strcat_array(hosts, ", "), Users = strcat_array(users, ", "),
           Categories = strcat_array(alert_categories, ", ")
  | project
      timestamp,
      IncidentId = incident_id,
      Severity = severity,
      Score = aggregated_score,
      AlertCount = alert_count,
      High = high_severity_alert_count,
      Medium = med_severity_alert_count,
      Categories,
      Hosts,
      Users,
      Description = description
  | order by Score desc, timestamp desc
tags: [cortex, paloalto, xdr, incidents, triage, security]
expected_output: |
  Open (new) incidents with score, severity, and affected hosts/users (sanitized).

  timestamp                    IncidentId  Severity  Score  AlertCount  High  Medium  Categories  Hosts                                              Users                 Description
  2026-05-29T...Z              803         medium    11     1           0     1       Malware     FINANCE-WS01:00000000000000000000000000000000      contoso\adele.vance   'Local Analysis Malware' generated by XDR Agent detected on host FINANCE-WS01 involving user contoso\adele.vance
