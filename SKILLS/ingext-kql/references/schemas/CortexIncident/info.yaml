schema: CortexIncident
description: >-
  PaloAlto Cortex XDR incident, imported by Ingext from the Cortex XDR API
  (Get Incidents / incidents endpoint). Each record is one incident: a group of
  related CortexAlert records sharing a common story, scored and summarized.
  It carries the incident identity and status, severity (effective and the
  per-severity alert counts), the aggregated/predicted/manual risk scores, the
  affected hosts and users, the contributing alert categories and sources, MITRE
  mapping, assignment/resolution metadata, and a deep link to the Cortex console.
  Alerts join to their incident via CortexAlert.case_id == incident_id. The object
  is stored as a dynamic JSON document, so array fields (hosts, users,
  alert_categories, incident_sources) require mv-expand. timestamp is parsed from
  creation_time.
fields:

  # ==========================================
  # CORE / INGEST
  # ==========================================
  - name: timestamp
    type: DateTime
    description: "Incident creation time, derived from creation_time (a Unix epoch in milliseconds). Primary time column for range filters (e.g. where timestamp > ago(7d)). Equivalent to unixtime_milliseconds_todatetime(creation_time)."

  - name: size
    type: Integer
    description: "Internal record size in bytes, used for ingestion accounting."

  # ==========================================
  # IDENTITY
  # ==========================================
  - name: incident_id
    type: String
    description: "Cortex XDR incident ID (numeric string), unique within the tenant. Equals CortexAlert.case_id."
    sampleValues: ["803"]

  - name: incident_name
    type: String
    description: "Custom incident name; null unless set by an analyst (Cortex then displays a generated description)."

  - name: description
    type: String
    description: "Auto-generated incident summary describing the leading alert, host, and user involved."
    sampleValues: ["'Local Analysis Malware' generated by XDR Agent detected on host FINANCE-WS01 involving user contoso\\adele.vance"]

  - name: xdr_url
    type: String
    description: "Deep link to the incident in the Cortex XDR console (tenant-specific). The caseId query parameter equals incident_id."
    sampleValues: ["https://contoso.xdr.us.paloaltonetworks.com/incident-view?caseId=803"]

  # ==========================================
  # TIMESTAMPS
  # ==========================================
  - name: creation_time
    type: DateTime
    description: "Incident creation time as a Unix epoch in milliseconds (numeric source of the 'timestamp' column). Convert with unixtime_milliseconds_todatetime(creation_time)."
    sampleValues: ["1782745970000"]

  - name: modification_time
    type: DateTime
    description: "When the incident was last modified (Unix epoch in milliseconds). Tracks the most recent update to status, scoring, or membership."
    sampleValues: ["1782745979000"]

  - name: detection_time
    type: DateTime
    description: "Earliest detection time across the incident's alerts (epoch ms); often null, in which case fall back to creation_time."

  - name: resolved_timestamp
    type: DateTime
    description: "When the incident was resolved (epoch ms); null while open."

  # ==========================================
  # STATUS / ASSIGNMENT
  # ==========================================
  - name: status
    type: String
    description: "Incident lifecycle status. 'new' = open/untriaged; other values include 'under_investigation' and 'resolved_*' dispositions (threat handled, false positive, duplicate, etc.)."
    sampleValues: ["new", "under_investigation", "resolved_threat_handled"]

  - name: severity
    type: String
    description: "Effective incident severity (manual_severity if set, otherwise the highest alert severity). Lowercase. Order: low < medium < high < critical."
    sampleValues: ["medium", "high", "critical", "low"]

  - name: assigned_user_mail
    type: String
    description: "Email of the analyst the incident is assigned to; null when unassigned."

  - name: assigned_user_pretty_name
    type: String
    description: "Display name of the assigned analyst; null when unassigned."

  - name: starred
    type: Boolean
    description: "Whether the incident is starred (auto/rule-driven highlight)."
    sampleValues: ["false"]

  - name: starred_manually
    type: Boolean
    description: "Whether an analyst manually starred the incident."
    sampleValues: ["false"]

  - name: notes
    type: String
    description: "Free-text analyst notes on the incident; null when none."

  - name: resolve_comment
    type: String
    description: "Comment recorded when the incident was resolved; null while open."

  # ==========================================
  # SCORING
  # ==========================================
  - name: aggregated_score
    type: Integer
    description: "Effective incident risk score shown in the console (manual_score if set, otherwise predicted/rule-based). Higher = higher priority."
    sampleValues: ["11"]

  - name: predicted_score
    type: Integer
    description: "Cortex-predicted (analytics) risk score for the incident."
    sampleValues: ["11"]

  - name: rule_based_score
    type: Integer
    description: "Risk score contributed by scoring rules; null when not rule-scored."

  - name: manual_score
    type: Integer
    description: "Analyst-overridden risk score; null unless manually set (then it drives aggregated_score)."

  - name: manual_severity
    type: String
    description: "Analyst-overridden severity; null unless manually set (then it drives 'severity')."

  - name: manual_description
    type: String
    description: "Analyst-overridden description; null unless manually set."

  # ==========================================
  # ALERT ROLL-UP
  # ==========================================
  - name: alert_count
    type: Integer
    description: "Total number of alerts grouped into the incident."
    sampleValues: ["1"]

  - name: critical_severity_alert_count
    type: Integer
    description: "Number of grouped alerts with critical severity."
    sampleValues: ["0"]

  - name: high_severity_alert_count
    type: Integer
    description: "Number of grouped alerts with high severity."
    sampleValues: ["0"]

  - name: med_severity_alert_count
    type: Integer
    description: "Number of grouped alerts with medium severity."
    sampleValues: ["1"]

  - name: low_severity_alert_count
    type: Integer
    description: "Number of grouped alerts with low severity."
    sampleValues: ["0"]

  - name: alerts_grouping_status
    type: String
    description: "Whether alert grouping is enabled for the incident."
    sampleValues: ["Enabled", "Disabled"]

  - name: alert_categories
    type: DynamicArray
    description: "Array of distinct alert categories present in the incident. Use mv-expand to enumerate."
    sampleValues: ["Malware", "Exploit"]

  - name: incident_sources
    type: DynamicArray
    description: "Array of distinct detection sources contributing alerts (e.g. 'XDR Agent', 'PAN NGFW'). Use mv-expand to enumerate."
    sampleValues: ["XDR Agent"]

  - name: wildfire_hits
    type: Integer
    description: "Count of WildFire malware-verdict hits within the incident."
    sampleValues: ["0"]

  # ==========================================
  # AFFECTED HOSTS / USERS
  # ==========================================
  - name: host_count
    type: Integer
    description: "Number of distinct hosts involved in the incident."
    sampleValues: ["1"]

  - name: hosts
    type: DynamicArray
    description: "Array of affected hosts, each formatted 'hostname:endpointId'. Split on ':' to separate the name from the Cortex endpoint GUID; use mv-expand to enumerate."
    sampleValues: ["FINANCE-WS01:00000000000000000000000000000000"]

  - name: user_count
    type: Integer
    description: "Number of distinct users involved in the incident."
    sampleValues: ["1"]

  - name: users
    type: DynamicArray
    description: "Array of involved users (DOMAIN\\username form). Use mv-expand to enumerate."
    sampleValues: ["contoso\\adele.vance"]

  # ==========================================
  # MITRE
  # ==========================================
  - name: mitre_tactics_ids_and_names
    type: DynamicArray
    description: "Array of MITRE ATT&CK tactic id/name strings across the incident's alerts; null when unmapped."

  - name: mitre_techniques_ids_and_names
    type: DynamicArray
    description: "Array of MITRE ATT&CK technique id/name strings across the incident's alerts; null when unmapped."

  # ==========================================
  # TAGS
  # ==========================================
  - name: tags
    type: DynamicArray
    description: "Current tags applied to the incident (data-source 'DS:' and endpoint-group 'EG:' conventions). Use mv-expand / has to filter."
    sampleValues: ["DS:PANW/XDR Agent", "EG:PCs - OS - Workstation"]

  - name: original_tags
    type: DynamicArray
    description: "Tags as originally assigned at ingest (before any later retagging)."
    sampleValues: ["EG:PCs - Location - HQ", "DS:PANW/XDR Agent"]
