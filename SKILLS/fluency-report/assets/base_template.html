<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{report_title}} · Fluency Report</title>

  <!-- Inter for body, JetBrains Mono for tabular data -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- NOTE: No external chart library is used. All charts are pure inline SVG or CSS.
       See widget_recipes.md for copy-paste patterns (line, bar, donut, KPI, etc.).
       All legacy class names (.kpi, .panel, .bar-*, .donut-*, .vol, .pill, .ns-*,
       .svg-chart, table.data, .sev-*) are preserved so existing recipes still fill. -->

  <style>
    :root {
      /* Brand */
      --red:    #c0161c;
      --red-2:  #e81e25;
      --blue:   #2d65a1;
      --blue-2: #457fc1;
      --navy:   #1d2a52;
      --green:  #1f9d55;
      --green-2:#2bbd6a;
      --amber:  #e8a01e;
      --purple: #5b4b8a;

      /* Surface */
      --bg:     #eef1f6;
      --card:   #ffffff;
      --bd1:    #e3e6ec;
      --bd2:    #eef0f4;

      /* Text */
      --ink:    #141925;
      --t1:     #1a1f2c;
      --t2:     #4a5163;
      --t3:     #8a92a3;

      /* Severity row tints */
      --sev-high:   #fdecec;
      --sev-med:    #fff7e8;
      --sev-low:    #f0f5fb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12.5px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Outer page = a single floating card. ~800px keeps it close to A4 width. */
    .page {
      max-width: 800px;
      margin: 22px auto;
      background: var(--card);
      border: 1px solid var(--bd1);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 34px rgba(20,25,37,.08);
    }
    .page-body {
      padding: 26px 30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* -- Hero header (dark gradient) ------------------------------------ */

    .hero {
      position: relative;
      color: #fff;
      padding: 26px 30px 24px;
      background:
        radial-gradient(900px 380px at 85% -20%, rgba(232,30,37,.42), transparent 60%),
        radial-gradient(700px 380px at -10% 130%, rgba(69,127,193,.5), transparent 55%),
        linear-gradient(135deg, #10172e 0%, #1d2a52 58%, #27264f 100%);
    }
    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 26px;
    }
    .logo-chip {
      background: #fff;
      border-radius: 9px;
      padding: 8px 12px;
      display: inline-flex;
    }
    .logo-chip img { height: 22px; max-width: 150px; object-fit: contain; display: block; }
    .hero-meta { font-size: 10.5px; color: #9fb0d4; text-align: right; padding-top: 6px; }
    .hero-meta strong { color: #fff; font-weight: 600; }

    .hero-eyebrow {
      font-size: 10.5px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: #9fb4e0; margin: 0 0 9px;
    }
    .hero-title {
      font-size: 28px; font-weight: 800; letter-spacing: -.02em;
      line-height: 1.08; margin: 0 0 6px;
    }
    .hero-sub { font-size: 12.5px; color: #cdd7ec; margin: 0; max-width: 64ch; line-height: 1.55; }

    /* -- Eyebrow / section titles (light) ------------------------------- */
    .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--red); margin: 0 0 6px; }
    .h-sec   { font-size: 19px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 4px; color: var(--ink); }
    .h-sub   { font-size: 12px; color: var(--t2); margin: 0 0 6px; max-width: 64ch; }
    .block-title { font-size: 11.5px; font-weight: 700; color: var(--ink); margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
    .block-title .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--blue); flex-shrink: 0; }

    /* -- KPI strip ------------------------------------------------------- */

    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      gap: 10px;
    }
    .kpi {
      background: linear-gradient(180deg, #fff, #fbfcfe);
      border: 1px solid var(--bd1);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 0;
    }
    .kpi-label {
      font-size: 9.5px;
      font-weight: 700;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kpi-value {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1.05;
      margin-bottom: 4px;
    }
    .kpi-value.red   { color: var(--red); }
    .kpi-value.blue  { color: var(--blue); }
    .kpi-value.navy  { color: var(--navy); }
    .kpi-value.green { color: var(--green); }
    .kpi-value.amber { color: var(--amber); }

    .kpi-note {
      font-size: 10.5px;
      color: var(--t2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* -- Main grid ------------------------------------------------------- */

    .main-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--bd1);
      border-radius: 11px;
      padding: 14px 16px;
      min-width: 0;
      grid-column: span 12;  /* default; override per-panel below */
    }
    .panel.col-4  { grid-column: span 4; }
    .panel.col-5  { grid-column: span 5; }
    .panel.col-6  { grid-column: span 6; }
    .panel.col-7  { grid-column: span 7; }
    .panel.col-8  { grid-column: span 8; }
    .panel.col-12 { grid-column: span 12; }

    @media (max-width: 640px) {
      .panel.col-4, .panel.col-5, .panel.col-6,
      .panel.col-7, .panel.col-8 { grid-column: span 12; }
    }

    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.005em;
    }
    .panel-subtitle {
      font-size: 10px;
      color: var(--t3);
      flex-shrink: 0;
    }

    /* Tables */
    table.data {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    table.data th {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--t3);
      text-align: left;
      padding: 0 6px 6px;
      border-bottom: 2px solid var(--bd1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table.data td {
      font-size: 11.5px;
      padding: 6px;
      border-bottom: 1px solid var(--bd2);
      color: var(--t1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    table.data td.num { font-family: 'JetBrains Mono', monospace; text-align: right; }
    table.data td.wrap { white-space: normal; word-break: break-word; line-height: 1.3; }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr.sev-high { background: var(--sev-high); }
    table.data tr.sev-med  { background: var(--sev-med); }
    table.data tr.sev-low  { background: var(--sev-low); }

    /* Severity pills */
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .pill.high { background: var(--red);   color: #fff; }
    .pill.med  { background: var(--amber); color: #fff; }
    .pill.low  { background: var(--blue);  color: #fff; }
    .pill.info { background: #eceff5;      color: var(--t2); }
    .pill.ok   { background: var(--green); color: #fff; }

    /* Volume bar (inline progress) */
    .vol {
      position: relative;
      height: 6px;
      background: var(--bd2);
      border-radius: 4px;
      overflow: hidden;
    }
    .vol-fill {
      position: absolute;
      inset: 0 auto 0 0;
      background: linear-gradient(90deg, var(--blue-2), var(--blue));
      border-radius: 4px;
    }
    .vol-fill.red  { background: linear-gradient(90deg, var(--red-2), var(--red)); }
    .vol-fill.amber{ background: linear-gradient(90deg, #f3b94e, var(--amber)); }

    /* -- SVG line chart primitives --------------------------------------- */
    /* A4 chart: viewBox "0 0 540 160", plot area y in [12, 135] (h=123)   */
    .svg-chart { width: 100%; height: auto; overflow: visible; display: block; }
    .chart-axis { font-size: 9px; fill: var(--t3); font-family: 'Inter', -apple-system, sans-serif; }
    .chart-gridline { stroke: var(--bd2); stroke-width: 1; }
    .chart-line { fill: none; stroke: var(--blue); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
    .chart-area { fill: rgba(45,101,161,0.10); }

    /* -- CSS horizontal bar chart --------------------------------------- */
    .bar-rows { display: flex; flex-direction: column; gap: 9px; }
    .bar-row { display: grid; grid-template-columns: 118px 1fr 48px; align-items: center; gap: 8px; }
    .bar-label { font-size: 10.5px; color: var(--t2); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { background: var(--bd2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue-2), var(--blue)); }
    .bar-val   { font-size: 10px; color: var(--t2); font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 600; }

    /* -- CSS donut chart (conic-gradient) ------------------------------- */
    .donut-wrap   { display: flex; align-items: center; gap: 18px; }
    .donut-ring   {
      flex-shrink: 0; width: 124px; height: 124px; border-radius: 50%; position: relative;
      -webkit-mask: radial-gradient(closest-side, transparent 60%, white 60%);
      mask: radial-gradient(closest-side, transparent 60%, white 60%);
    }
    /* Optional centred label inside a donut: place a .donut-center sibling
       absolutely over the ring (wrap ring + center in a positioned box). */
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .donut-center .big { font-size: 24px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
    .donut-center .cap { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--t3); margin-top: 3px; }
    .donut-legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-row   { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--t2); }
    .legend-swatch{ width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* -- Callouts (Healthy / Watch / Act) ------------------------------- */
    .callouts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .callout  { border: 1px solid var(--bd1); border-radius: 11px; padding: 14px 15px; background: var(--card); position: relative; }
    .callout::before { content: ""; position: absolute; left: 0; top: 13px; bottom: 13px; width: 4px; border-radius: 4px; }
    .callout.good::before  { background: var(--green); }
    .callout.watch::before { background: var(--amber); }
    .callout.act::before   { background: var(--red); }
    .callout .tag { font-size: 9.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; margin: 0 0 6px; padding-left: 10px; }
    .callout.good .tag  { color: var(--green); }
    .callout.watch .tag { color: #b9791a; }
    .callout.act .tag   { color: var(--red); }
    .callout h4 { font-size: 13px; font-weight: 700; margin: 0 0 4px; padding-left: 10px; color: var(--ink); }
    .callout p  { font-size: 11px; color: var(--t2); margin: 0; padding-left: 10px; line-height: 1.5; }

    /* -- Risk gauge ----------------------------------------------------- */
    .gauge { display: flex; align-items: center; gap: 16px; border: 1px solid var(--bd1); border-radius: 12px; padding: 16px 18px; background: linear-gradient(180deg,#fff,#fafbfd); }
    .gauge-ring { position: relative; width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0;
      -webkit-mask: radial-gradient(closest-side, transparent 62%, #000 62%); mask: radial-gradient(closest-side, transparent 62%, #000 62%); }
    .gauge-ring .c { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .gauge-ring .c .s { font-size: 22px; font-weight: 800; line-height: 1; }
    .gauge-ring .c .t { font-size: 8.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--t3); margin-top: 3px; }
    .gauge-txt h4 { margin: 0 0 4px; font-size: 13px; color: var(--ink); }
    .gauge-txt p  { margin: 0; font-size: 11px; color: var(--t2); line-height: 1.5; }

    /* -- Note strips ---------------------------------------------------- */
    .note { display: flex; gap: 11px; align-items: flex-start; border: 1px solid var(--bd1);
      border-left: 4px solid var(--amber); background: #fffdf7; border-radius: 9px; padding: 12px 14px; }
    .note .ic { font-size: 15px; line-height: 1.2; }
    .note p { margin: 0; font-size: 11px; color: var(--t2); line-height: 1.55; }
    .note p b { color: var(--ink); }
    .note.blue  { border-left-color: var(--blue);  background: #f7fbff; }
    .note.green { border-left-color: var(--green); background: #f6fcf8; }

    /* -- Summary block (lead callout) ----------------------------------- */

    .summary {
      background: linear-gradient(180deg,#fff,#fbfcfe);
      border: 1px solid var(--bd1);
      border-left: 4px solid var(--blue);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--t1);
    }
    .summary p { margin: 0 0 8px; }
    .summary p:last-child { margin-bottom: 0; }
    .summary strong { color: var(--ink); font-weight: 600; }

    /* -- Next steps ----------------------------------------------------- */

    .next-steps {
      background: var(--card);
      border: 1px solid var(--bd1);
      border-radius: 11px;
      padding: 14px 16px;
    }
    .next-steps h3 {
      font-size: 12px;
      font-weight: 800;
      margin: 0 0 12px;
      color: var(--ink);
      letter-spacing: -.01em;
    }
    .ns-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 11px 14px;
    }
    .ns-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .ns-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 7px;
      background: var(--blue);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .ns-when {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--t3);
      margin-bottom: 2px;
    }
    .ns-act {
      font-size: 11px;
      color: var(--t1);
      line-height: 1.4;
    }
    .ns-act strong { color: var(--ink); font-weight: 600; }

    .divider { height: 1px; background: var(--bd2); margin: 4px 0; }

    /* -- Footer --------------------------------------------------------- */

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 30px;
      border-top: 1px solid var(--bd2);
      font-size: 10px;
      color: var(--t3);
      gap: 16px;
    }
    .footer a {
      color: var(--blue);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* Print: keep colours, drop the floating-card chrome so it fills A4.
       Multi-page by default — content flows across pages, but each card,
       panel, and table row stays intact rather than splitting across a
       page break. (To force a single page, the PDF step passes --one-page.) */
    @media print {
      body { background: #fff; }
      .page { max-width: none; margin: 0; border: none; border-radius: 0; box-shadow: none; }
      .panel, .kpi, .callout, .gauge, .note, .summary, .next-steps,
      .ns-item, .bar-row, .legend-row, .donut-wrap, table.data tr {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .main-grid, .kpi-strip, .callouts { break-inside: auto; }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- Hero header (dark gradient) -->
    <div class="hero">
      <div class="hero-top">
        <a class="logo-chip" href="https://fluencysecurity.com" target="_blank" rel="noopener">
          <img src="assets/logo2.png" alt="Fluency">
        </a>
        <div class="hero-meta">Generated <strong>{{report_date}}</strong>{{report_meta}}</div>
      </div>
      <p class="hero-eyebrow">Fluency Report</p>
      <h1 class="hero-title">{{report_title}}</h1>
      <p class="hero-sub">{{report_subtitle}}</p>
    </div>

    <div class="page-body">

      <!-- KPI strip — 4-6 cards -->
      <div class="kpi-strip">
        {{kpi_strip}}
      </div>

      <!-- Written interpretation of the highest-signal numbers -->
      <div class="summary">
        {{summary_html}}
      </div>

      <!-- Main grid — use .panel.col-4/.col-6/.col-8/.col-12.
           Optional richer components available: .callouts/.callout,
           .gauge, .note, .donut-center. See widget_recipes.md. -->
      <div class="main-grid">
        {{main_grid}}
      </div>

      <!-- Recommended next steps -->
      <div class="next-steps">
        <h3>Recommended Next Steps</h3>
        <div class="ns-grid">
          {{next_steps_items}}
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <div>{{footer_page_info}}</div>
      <div>Data as at <strong>{{footer_data_date}}</strong> · powered by <a href="https://fluencysecurity.com" target="_blank" rel="noopener">Fluency</a></div>
    </div>

  </div>
</body>
</html>
